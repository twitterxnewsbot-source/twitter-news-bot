name: Twitter News Bot

on:
  # Run automatically every 30 minutes
  schedule:
    - cron: "*/30 * * * *"

  # Allow manual triggers from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-bot:
    name: Run news bot
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip          # cache dependencies between runs

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore the posted-links file from the previous run ───────────────
      #
      # We cache posted_links.json between workflow runs so the bot remembers
      # which articles it already tweeted.  The cache key includes the date so
      # it refreshes daily (GitHub cache entries expire after 7 days anyway).
      - name: Restore posted-links cache
        uses: actions/cache@v4
        with:
          path: bot/posted_links.json
          key: posted-links-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            posted-links-${{ runner.os }}-

      # ── 5. Run the bot (single run – schedule is handled by cron above) ───────
      - name: Run bot
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      # ── 6. Save updated posted-links file ────────────────────────────────────
      #
      # The cache step above already handles saving on a cache miss.
      # We explicitly upload the file as an artifact so you can inspect it.
      - name: Upload posted-links artifact
        if: always()         # save even if the bot run fails
        uses: actions/upload-artifact@v4
        with:
          name: posted-links-${{ github.run_id }}
          path: bot/posted_links.json
          retention-days: 7
                                                                                                                                                          
