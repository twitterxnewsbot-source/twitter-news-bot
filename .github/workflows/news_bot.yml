name: Twitter News Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    name: Run news bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted-links cache
        uses: actions/cache@v4
        with:
          path: posted_links.json
          key: posted-links-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            posted-links-${{ runner.os }}-

      - name: Run bot
        env:
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload posted-links artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posted-links-${{ github.run_id }}
          path: posted_links.json
          retention-days: 7
